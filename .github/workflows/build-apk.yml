name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-levels: '34'
        build-tools: '36.0.0'
        ndk-version: '27.1.12297006'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Create prebuild
      run: npx expo prebuild --clean --platform android
      
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x lint --max-workers=2
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v1
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        name: Syria VPN Pro v${{ github.run_number }}
        body: |
          🎉 Syria VPN Pro APK Build #${{ github.run_number }}
          
          **Features:**
          - 5 Premium US Residential Servers
          - MTU 1280 optimized for Syrian networks (Syriatel & MTN)
          - WireGuard Protocol with AES-256-GCM
          - Modern Dark UI
          
          **Download:** app-debug.apk
        draft: false
        prerelease: false
        files: android/app/build/outputs/apk/debug/app-debug.apk
